name: CI

on:
  push:
    branches: ["main", "staging"]
  pull_request:

# Cancel superseded runs on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Backend — pytest + ruff
  # -----------------------------------------------------------------------
  backend:
    name: Backend (pytest + ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        # Integration tests (tests/integration/) require a live Supabase
        # stack and are skipped in default CI. See docs/development/ci.md
        # for how to enable them on staging runners.
        run: uv run pytest --ignore=tests/integration -q

      - name: Run ruff
        run: uv run ruff check .

  # -----------------------------------------------------------------------
  # Frontend — typecheck + lint + build
  # -----------------------------------------------------------------------
  frontend:
    name: Frontend (typecheck + lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.2

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck:web

      - name: Lint
        run: pnpm lint:web

      - name: Build
        # Provide placeholder public env vars so Next.js can compile the
        # client bundle. These values are never used at runtime in CI.
        run: pnpm build:web
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_placeholder

  # -----------------------------------------------------------------------
  # Security — gitleaks secret scan
  # -----------------------------------------------------------------------
  security:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan working tree for secrets
        # Scans file content only (--no-git). Git history must be cleaned
        # separately before any public push — see docs/development/ci.md.
        run: gitleaks detect --source . --config .gitleaks.toml --no-git

      - name: Install uv (for secret-safety tests)
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install API dependencies
        working-directory: apps/api
        run: uv sync --extra dev

      - name: Run secret-safety pytest tests
        working-directory: apps/api
        run: |
          uv run pytest \
            tests/security/test_phase30a_security.py \
            tests/security/test_phase30c_remediation.py \
            tests/security/test_phase30d_polish.py \
            -v
