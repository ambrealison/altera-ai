# Supabase CLI project config.
#
# Apply migrations locally with `supabase db reset` from the repo root
# (the CLI looks up this file via `supabase/config.toml`). The deployed
# project_id is set via the CLI's `supabase link` command and stored in
# `supabase/.temp/`, not here.

project_id = "altera-ai-local"

[api]
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
port = 54323

[storage]
file_size_limit = "52428800"  # 50 MB — matches docs/data/input-formats.md

[auth]
enable_signup = true
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
